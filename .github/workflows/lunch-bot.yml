name: 구내식당 메뉴 알림

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 이전에 보낸 이미지 해시를 캐시에 보관 -> 중복 전송 방지
      - uses: actions/cache@v4
        with:
          path: .last_menu
          key: last-menu-${{ github.run_id }}
          restore-keys: last-menu-

      - name: Run
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python lunch_bot.py --force
